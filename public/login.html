<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ANDO - Secure Messenger Login</title>
    <link rel="icon" type="image/jpeg" href="/ando-logo.jpeg" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .login-container {
        background: white;
        border-radius: 12px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        max-width: 420px;
        width: 100%;
        padding: 40px;
      }

      .brand {
        text-align: center;
        margin-bottom: 30px;
      }

      .brand img {
        width: 60px;
        height: 60px;
        margin-bottom: 12px;
      }

      .brand h1 {
        font-size: 28px;
        margin-bottom: 8px;
        color: #333;
      }

      .brand p {
        color: #666;
        font-size: 14px;
      }

      .tabs {
        display: flex;
        gap: 10px;
        margin-bottom: 24px;
        border-bottom: 1px solid #eee;
      }

      .tab-btn {
        flex: 1;
        padding: 12px;
        border: none;
        background: none;
        color: #999;
        cursor: pointer;
        font-size: 14px;
        font-weight: 500;
        border-bottom: 2px solid transparent;
        transition: all 0.3s;
      }

      .tab-btn.active {
        color: #667eea;
        border-bottom-color: #667eea;
      }

      .tab-content {
        display: none;
      }

      .tab-content.active {
        display: block;
      }

      .form-group {
        margin-bottom: 16px;
      }

      label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        color: #333;
        margin-bottom: 6px;
      }

      input[type="email"],
      input[type="password"],
      input[type="tel"],
      input[type="text"] {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #ddd;
        border-radius: 6px;
        font-size: 14px;
        transition: border-color 0.3s;
      }

      input[type="email"]:focus,
      input[type="password"]:focus,
      input[type="tel"]:focus,
      input[type="text"]:focus {
        outline: none;
        border-color: #667eea;
      }

      .toggle-mode {
        text-align: center;
        margin-bottom: 16px;
        font-size: 13px;
      }

      .toggle-mode button {
        background: none;
        border: none;
        color: #667eea;
        cursor: pointer;
        text-decoration: underline;
        padding: 0;
        font: inherit;
      }

      button[type="submit"] {
        width: 100%;
        padding: 12px;
        background: #667eea;
        color: white;
        border: none;
        border-radius: 6px;
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
        transition: background 0.3s;
      }

      button[type="submit"]:hover {
        background: #5568d3;
      }

      button[type="submit"]:active {
        transform: translateY(1px);
      }

      .google-btn {
        width: 100%;
        padding: 12px;
        background: #f8f9fa;
        color: #333;
        border: 1px solid #ddd;
        border-radius: 6px;
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
        transition: all 0.3s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      .google-btn:hover {
        background: #f1f3f5;
        border-color: #bbb;
      }

      .error {
        color: #d73a49;
        background: #ffd6d6;
        padding: 10px 12px;
        border-radius: 6px;
        font-size: 13px;
        margin-bottom: 16px;
        display: none;
      }

      .error.show {
        display: block;
      }

      .loading {
        opacity: 0.6;
        pointer-events: none;
      }

      .toast {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: #333;
        color: white;
        padding: 12px 16px;
        border-radius: 6px;
        font-size: 13px;
        opacity: 0;
        transition: opacity 0.3s;
        z-index: 1000;
      }

      .toast.show {
        opacity: 1;
      }

      .spinner {
        display: inline-block;
        width: 14px;
        height: 14px;
        border: 2px solid #f3f3f3;
        border-top: 2px solid #667eea;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="brand">
        <img src="/ando-logo.jpeg" alt="ANDO logo" />
        <h1>ANDO</h1>
        <p>Secure Encrypted Messenger</p>
      </div>

      <div class="tabs">
        <button class="tab-btn active" data-tab="email">Email</button>
        <button class="tab-btn" data-tab="phone">Phone</button>
        <button class="tab-btn" data-tab="google">Google</button>
      </div>

      <!-- Email Tab -->
      <div id="email-tab" class="tab-content active">
        <div class="error" id="email-error"></div>
        <form id="email-form">
          <div class="form-group">
            <label for="email-input">Email Address</label>
            <input id="email-input" type="email" placeholder="you@example.com" required />
          </div>
          <div class="form-group">
            <label for="email-password">Password</label>
            <input id="email-password" type="password" placeholder="••••••••" required />
          </div>
          <div class="form-group">
            <label for="email-name" id="email-name-label" style="display: none">Full Name</label>
            <input id="email-name" type="text" placeholder="Full Name" style="display: none" />
          </div>
          <div class="toggle-mode">
            <button type="button" id="email-toggle">Don't have an account? Sign up</button>
          </div>
          <button type="submit" id="email-submit">Sign In</button>
        </form>
      </div>

      <!-- Phone Tab -->
      <div id="phone-tab" class="tab-content">
        <div class="error" id="phone-error"></div>
        <form id="phone-form">
          <div class="form-group">
            <label for="phone-input">Phone Number</label>
            <input id="phone-input" type="tel" placeholder="+1 (555) 000-0000" required />
          </div>
          <div class="form-group">
            <label for="phone-password">Password</label>
            <input id="phone-password" type="password" placeholder="••••••••" required />
          </div>
          <div class="form-group">
            <label for="phone-name" id="phone-name-label" style="display: none">Full Name</label>
            <input id="phone-name" type="text" placeholder="Full Name" style="display: none" />
          </div>
          <div class="toggle-mode">
            <button type="button" id="phone-toggle">Don't have an account? Sign up</button>
          </div>
          <button type="submit" id="phone-submit">Sign In</button>
        </form>
      </div>

      <!-- Google Tab -->
      <div id="google-tab" class="tab-content">
        <div class="error" id="google-error"></div>
        <p style="text-align: center; color: #666; font-size: 13px; margin-bottom: 20px">
          Sign in securely with your Google account
        </p>
        <button type="button" class="google-btn" id="google-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"></circle>
          </svg>
          Sign in with Google
        </button>
        <p style="text-align: center; color: #999; font-size: 12px; margin-top: 16px">
          We'll create an account if one doesn't exist
        </p>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script type="module" src="/login.js"></script>
  </body>
</html>
